name: Linux Release Build

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-linux-artifacts:
    runs-on: ubuntu-latest
    container:
      image: quay.io/pypa/manylinux_2_28_x86_64
    env:
      BIFRORE_WHEEL_PLATFORM_TAG: manylinux_2_28_x86_64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install system build tools
        run: |
          dnf install -y gcc gcc-c++ make findutils which tar gzip zip

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python packaging dependencies
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Build Linux jar and wheel
        run: |
          chmod +x build.sh
          ./build.sh java
          ./build.sh python

      - name: Verify build outputs
        run: |
          test -f build/bifrore-java.jar
          ls -1 build/*.whl

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bifrore-linux-release-artifacts
          path: |
            build/bifrore-java.jar
            build/*.whl
          if-no-files-found: error

      - name: Upload assets to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/bifrore-java.jar
            build/*.whl
